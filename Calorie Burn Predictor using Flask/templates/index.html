<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calorie Burn Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="scan"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">Calorie Burn</span><span class="brand-mark accent">·Predictor</span>
  </div>
  
</header>

<section class="hero">
  <svg class="pulse-line" viewBox="0 0 1200 120" preserveAspectRatio="none" aria-hidden="true">
    <path id="pulsePath" d="M0,60 L1200,60" />
  </svg>
  <div class="hero-copy">
  </div>
</section>

<main class="layout">

  <section class="panel form-panel">
    <div class="mode-toggle" role="tablist" aria-label="Prediction method">
      <button class="mode-btn active" data-mode="heart_rate" role="tab" aria-selected="true">
        <span class="mode-index">01</span> Heart Rate
      </button>
      <button class="mode-btn" data-mode="activity" role="tab" aria-selected="false">
        <span class="mode-index">02</span> Activity Type
      </button>
    </div>

    <form id="predictForm" autocomplete="off">

      <div class="field-row">
        <div class="field">
          <label for="weight">Weight <span class="unit">kg</span></label>
          <input type="number" id="weight" name="weight" min="1" step="0.1" placeholder="70" required>
        </div>
        <div class="field">
          <label for="duration">Duration <span class="unit">min</span></label>
          <input type="number" id="duration" name="duration" min="1" step="1" placeholder="30" required>
        </div>
      </div>

      <div id="heartRateFields" class="mode-fields">
        <div class="field-row">
          <div class="field">
            <label for="age">Age <span class="unit">yrs</span></label>
            <input type="number" id="age" name="age" min="1" step="1" placeholder="28">
          </div>
          <div class="field">
            <label for="heart_rate">Heart rate <span class="unit">bpm</span></label>
            <input type="number" id="heart_rate" name="heart_rate" min="1" step="1" placeholder="140">
          </div>
        </div>
        <div class="field">
          <label>Gender</label>
          <div class="pill-group">
            <button type="button" class="pill active" data-gender="male">Male</button>
            <button type="button" class="pill" data-gender="female">Female</button>
          </div>
        </div>
      </div>

      <div id="activityFields" class="mode-fields hidden">
        <div class="field">
          <label for="activity">Activity</label>
          <select id="activity" name="activity">
            {% for key, label in activities.items() %}
            <option value="{{ key }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn">
        <span>Calculate Burn</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h11M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <p class="error-msg" id="errorMsg"></p>
    </form>
  </section>

  <section class="panel result-panel">
    <div class="gauge-wrap">
      <svg class="gauge" viewBox="0 0 220 220" aria-hidden="true">
        <defs>
          <linearGradient id="flameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff8a4c"></stop>
            <stop offset="100%" stop-color="#e63946"></stop>
          </linearGradient>
        </defs>
        <circle class="gauge-track" cx="110" cy="110" r="92"></circle>
        <circle class="gauge-fill" id="gaugeFill" cx="110" cy="110" r="92"></circle>
      </svg>
      <div class="gauge-center">
        <span class="gauge-number" id="calorieResult">—</span>
        <span class="gauge-unit">kcal</span>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat">
        <span class="stat-label">Per minute</span>
        <span class="stat-value" id="perMinute">—</span>
      </div>
      
    </div>

    
  </section>

</main>



<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
